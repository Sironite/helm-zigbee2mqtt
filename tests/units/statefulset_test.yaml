suite: statefulset
templates:
  - templates/statefulset.yaml
release:
  name: zigbee2mqtt
  namespace: zigbee2mqtt

tests:
  - it: renders StatefulSet with defaults
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: zigbee2mqtt
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].name
          value: zigbee2mqtt
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: uses appVersion as image tag when tag is empty
    set:
      image.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "koenkk/zigbee2mqtt:2"

  - it: uses explicit image tag when set
    set:
      image.tag: "2.9.2"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: koenkk/zigbee2mqtt:2.9.2

  - it: uses custom storageClassName when set
    set:
      persistence.storageClassName: longhorn-standard
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: longhorn-standard

  - it: omits storageClassName when empty
    set:
      persistence.storageClassName: ""
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates[0].spec.storageClassName

  - it: mounts device when device is set
    set:
      device: /dev/ttyUSB0
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: zigbee-device
            hostPath:
              path: /dev/ttyUSB0
              type: CharDevice

  - it: mounts external secret under /app/data when enabled
    set:
      externalSecrets.enabled: true
      externalSecrets.items:
        - name: zigbee2mqtt-config
          secretStoreRef: my-secret-store
          remoteKey: zigbee2mqtt-config
          secretKey: configuration.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: zigbee2mqtt-config
            mountPath: /app/data/configuration.yaml
            subPath: configuration.yaml
            readOnly: true
