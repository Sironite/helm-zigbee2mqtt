name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint . -f values.yaml.example

      - name: Check deprecated APIs
        uses: FairwindsOps/pluto/github-action@master
        with:
          helm-chart-path: .
          ignore-deprecations: false
          output: table

  security:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          helm-values: values.yaml.example
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version 0.7.1 --verify=false

      - name: Run unit tests
        run: helm unittest -f 'tests/units/*_test.yaml' .
