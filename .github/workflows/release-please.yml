name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      version: ${{ steps.release-please.outputs.major }}.${{ steps.release-please.outputs.minor }}.${{ steps.release-please.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - uses: azure/setup-helm@v5

      - name: Import GPG signing key
        env:
          HELM_GPG_PRIVATE_KEY: ${{ secrets.HELM_GPG_PRIVATE_KEY }}
        run: |
          echo "$HELM_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --export-secret-keys > /tmp/secring.gpg

      - name: Regenerate README
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          docker run --rm \
            --volume "$PWD:/helm-docs" \
            --workdir /helm-docs \
            jnorwood/helm-docs:v1.14.2 \
            --chart-search-root=. \
            --template-files=docs/README.md.gotmpl \
            --output-file=README.md
          git add README.md
          git diff --cached --quiet || git commit -m "docs: regenerate README for $(grep '^version:' Chart.yaml | awk '{print $2}')"
          git push origin HEAD:main

      - name: Package and sign chart
        run: |
          helm package . \
            --sign \
            --key "Sironite Helm Charts" \
            --keyring /tmp/secring.gpg

      - name: Publish to GitHub Pages
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          VERSION="${{ needs.release-please.outputs.version }}"
          CHART_TGZ="zigbee2mqtt-${VERSION}.tgz"
          CHART_PROV="zigbee2mqtt-${VERSION}.tgz.prov"
          PAGES_URL="https://sironite.github.io/helm-zigbee2mqtt"

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          cp "$CHART_TGZ" /tmp/gh-pages/
          cp "$CHART_PROV" /tmp/gh-pages/
          cp artifacthub-repo.yml /tmp/gh-pages/
          cd /tmp/gh-pages
          helm repo index . --url "$PAGES_URL" --merge index.yaml 2>/dev/null || helm repo index . --url "$PAGES_URL"
          git add .
          git commit -m "Release ${VERSION}" || echo "Nothing to commit"
          git push origin HEAD:gh-pages

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI chart
        run: |
          helm push "zigbee2mqtt-${{ needs.release-please.outputs.version }}.tgz" oci://ghcr.io/sironite
