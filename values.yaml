# -- Zigbee2MQTT container image.
image:
  # -- Image repository.
  repository: koenkk/zigbee2mqtt
  # -- Image tag. Defaults to `Chart.appVersion` when empty.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Override the chart name used in resource names and labels.
nameOverride: ""
# -- Override the full resource name prefix.
fullnameOverride: ""

# -- Environment variables injected into the Zigbee2MQTT container.
env:
- name: TZ
  value: UTC

# -- Kubernetes Service configuration.
service:
  # -- Service type.
  type: ClusterIP
  # -- Port to expose. Zigbee2MQTT frontend listens on 8080 by default.
  port: 8080
  # -- Annotations merged onto the Service resource.
  annotations: {}
  # -- LoadBalancer IP to request (only used when `type: LoadBalancer`).
  # loadBalancerIP: ""

# -- Host device path for the Zigbee USB adapter (e.g. `/dev/ttyUSB0` or `/dev/serial/by-id/...`).
# When set, the device node is mounted into the container. Leave empty when using a network-attached coordinator.
device: ""

# -- Persistent storage for the Zigbee2MQTT `/app/data` directory.
persistence:
  # -- Enable the PersistentVolumeClaim.
  enabled: true
  # -- Storage size.
  size: 2Gi
  # -- StorageClass name. Defaults to the cluster default when empty.
  storageClassName: ""

# -- Resource requests and limits for the Zigbee2MQTT container.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# -- Extra labels merged onto the Namespace created by this chart.
namespaceLabels: {}

# -- NetworkPolicy configuration.
networkPolicy:
  cilium:
    # -- Enable CiliumNetworkPolicy rendering. Requires [Cilium CNI](https://cilium.io).
    enabled: false
  kubernetes:
    # -- Enable standard Kubernetes NetworkPolicy rendering. Works with any CNI that supports NetworkPolicy.
    enabled: false
  # -- Namespace where Prometheus runs. When set, adds an ingress rule allowing Prometheus scraping on port 8080.
  prometheusNamespace: ""
  # -- Namespace of the MQTT broker (e.g. EMQX). When set, adds an egress rule on port 1883.
  mqttNamespace: ""
  # -- Extra ingress rules appended to the NetworkPolicy (both Cilium and Kubernetes).
  extraIngress: []
  # - fromEndpoints:                          # Cilium syntax
  #     - matchLabels:
  #         k8s:io.kubernetes.pod.namespace: my-namespace
  #   toPorts:
  #     - ports:
  #         - port: "8080"
  # - from:                                   # Kubernetes syntax
  #     - namespaceSelector:
  #         matchLabels:
  #           kubernetes.io/metadata.name: my-namespace
  #   ports:
  #     - port: 8080
  # -- Extra egress rules appended to the NetworkPolicy (both Cilium and Kubernetes).
  extraEgress: []
  # - toEndpoints:                            # Cilium syntax
  #     - matchLabels:
  #         k8s:io.kubernetes.pod.namespace: my-namespace
  #   toPorts:
  #     - ports:
  #         - port: "5432"
  # - to:                                     # Kubernetes syntax
  #     - namespaceSelector:
  #         matchLabels:
  #           kubernetes.io/metadata.name: my-namespace
  #   ports:
  #     - port: 5432

# -- External Secrets Operator integration for pulling secrets from an external secret store.
# Requires [ESO](https://external-secrets.io) installed in the cluster.
# Each item creates an `ExternalSecret` that syncs a secret into a Kubernetes `Secret`,
# which is then mounted into the Zigbee2MQTT container under `/app/data`.
externalSecrets:
  # -- Enable ExternalSecret rendering.
  enabled: false
  # -- List of secrets to sync.
  items: []
  # - name: zigbee2mqtt-config
  #   # ClusterSecretStore name (e.g. onepassword-connect, vault, aws-ssm)
  #   secretStoreRef: my-secret-store
  #   # Key in the external store
  #   remoteKey: zigbee2mqtt-config
  #   # Key name inside the resulting Kubernetes Secret (also the filename when mounted under /app/data)
  #   secretKey: configuration.yaml
  #   # File permission on the mounted secret. 0444 = world-readable.
  #   defaultMode: 0444

# -- Standard Kubernetes Ingress resource. Use when a Gateway API HTTPRoute is not available.
ingress:
  # -- Enable Ingress rendering.
  enabled: false
  # -- IngressClass name (e.g. `nginx`, `traefik`).
  className: ""
  # -- Annotations merged onto the Ingress resource.
  annotations: {}
  # -- Hostname for the Ingress rule.
  hostname: ""
  # -- TLS configuration.
  tls: []
  # - hosts:
  #   - zigbee.example.com
  #   secretName: zigbee2mqtt-tls

# -- Gateway API `HTTPRoute` resources. Requires [Gateway API CRDs](https://gateway-api.sigs.k8s.io).
httproutes: []
# - enabled: true
#   name: zigbee2mqtt-httproute
#   namespace: zigbee2mqtt
#   hostname: zigbee.example.com
#   path: /
#   gateway:
#     name: my-gateway
#     namespace: kube-system
#     sectionName: https-listener
#   backend:
#     name: zigbee2mqtt
#     port: 8080
