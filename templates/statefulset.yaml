apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "zigbee2mqtt.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zigbee2mqtt.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "zigbee2mqtt.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "zigbee2mqtt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zigbee2mqtt.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: zigbee2mqtt
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          seccompProfile:
            type: RuntimeDefault
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        {{- if .Values.env }}
        env:
        {{- toYaml .Values.env | nindent 8 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /app/data
        {{- if .Values.externalSecrets.enabled }}
        {{- range .Values.externalSecrets.items }}
        - name: {{ .name }}
          mountPath: /app/data/{{ .secretKey }}
          subPath: {{ .secretKey }}
          readOnly: true
        {{- end }}
        {{- end }}
        {{- if or .Values.config.existingSecret .Values.config.existingConfigMap }}
        - name: config-file
          mountPath: /app/data/configuration.yaml
          subPath: configuration.yaml
          readOnly: true
        {{- end }}
        {{- if .Values.device }}
        - name: zigbee-device
          mountPath: {{ .Values.device }}
        {{- end }}
        {{- if .Values.resources }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      volumes:
      {{- if .Values.externalSecrets.enabled }}
      {{- range .Values.externalSecrets.items }}
      - name: {{ .name }}
        secret:
          secretName: {{ .name }}
          defaultMode: {{ default 0440 .defaultMode }}
      {{- end }}
      {{- end }}
      {{- if .Values.config.existingSecret }}
      - name: config-file
        secret:
          secretName: {{ .Values.config.existingSecret }}
      {{- else if .Values.config.existingConfigMap }}
      - name: config-file
        configMap:
          name: {{ .Values.config.existingConfigMap }}
      {{- end }}
      {{- if .Values.device }}
      - name: zigbee-device
        hostPath:
          path: {{ .Values.device }}
          type: CharDevice
      {{- end }}

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.persistence.storageClassName }}
      storageClassName: {{ .Values.persistence.storageClassName }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.size | default "2Gi" }}
