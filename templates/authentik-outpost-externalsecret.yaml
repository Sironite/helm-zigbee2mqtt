{{- if and .Values.authentikOutpost.enabled .Values.authentikOutpost.externalSecret.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "zigbee2mqtt.authentikOutpostSecretName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.authentikOutpost.externalSecret.secretStoreRef }}
  target:
    creationPolicy: Owner
    name: {{ include "zigbee2mqtt.authentikOutpostSecretName" . }}
  data:
  - secretKey: token
    remoteRef:
      key: {{ .Values.authentikOutpost.externalSecret.remoteKey }}
      property: token
{{- end }}
