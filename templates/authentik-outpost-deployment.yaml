{{- if .Values.authentikOutpost.enabled }}
{{- $outpost := .Values.authentikOutpost }}
{{- $secretName := default (include "zigbee2mqtt.authentikOutpostSecretName" .) $outpost.existingSecret }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zigbee2mqtt.fullname" . }}-authentik-outpost
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zigbee2mqtt.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-outpost
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zigbee2mqtt.name" . }}-authentik-outpost
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zigbee2mqtt.name" . }}-authentik-outpost
    spec:
      containers:
      - name: proxy
        image: "{{ $outpost.image.repository }}:{{ $outpost.image.tag }}"
        env:
        - name: AUTHENTIK_HOST
          value: {{ $outpost.authentikHost | quote }}
        - name: AUTHENTIK_INSECURE
          value: "false"
        - name: AUTHENTIK_HOST_BROWSER
          value: {{ $outpost.authentikHostBrowser | quote }}
        - name: AUTHENTIK_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $secretName }}
              key: token
        ports:
        - containerPort: 9000
          name: http
        - containerPort: 9443
          name: https
        livenessProbe:
          httpGet:
            path: /outpost.goauthentik.io/ping
            port: 9300
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /outpost.goauthentik.io/ping
            port: 9300
          initialDelaySeconds: 5
          periodSeconds: 5
        {{- if $outpost.resources }}
        resources:
          {{- toYaml $outpost.resources | nindent 10 }}
        {{- end }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zigbee2mqtt.fullname" . }}-authentik-outpost
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zigbee2mqtt.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-outpost
spec:
  selector:
    app.kubernetes.io/name: {{ include "zigbee2mqtt.name" . }}-authentik-outpost
  ports:
  - name: http
    port: 9000
    targetPort: 9000
{{- end }}
